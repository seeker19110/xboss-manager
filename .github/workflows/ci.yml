name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cài đặt
        run: npm ci

      - name: Quét bảo mật phụ thuộc
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Kiểm tra format
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
