name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Luôn chạy (không cần package.json) — bắt link gãy / tên file cũ sót lại trong tài liệu
  # của chính repo khung, để không phải rà tay sau mỗi lần đổi tên file.
  docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-docs-consistency.sh

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Repo khung (chưa có app) → bỏ qua các bước build/test để CI vẫn xanh.
      # Khi dự án thật được tạo (có package.json), toàn bộ hàng rào tự kích hoạt.
      - name: Kiểm tra đã có ứng dụng chưa
        id: app
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Chưa có package.json — đây là repo khung (template). Bỏ qua build/test; hàng rào sẽ tự chạy khi có dự án thật."
          fi

      # Cổng "sẵn sàng phát triển": dự án thật KHÔNG được còn placeholder [ĐIỀN: ...]
      # trong CLAUDE.md (KHOI-TAO Phần C). Repo khung (chưa có app) được bỏ qua.
      - name: Cổng "không còn [ĐIỀN]" trong CLAUDE.md
        if: steps.app.outputs.exists == 'true'
        run: |
          if grep -q "\[ĐIỀN" CLAUDE.md; then
            echo "::error::CLAUDE.md còn placeholder [ĐIỀN: ...] — điền đầy đủ cho dự án trước khi phát triển."
            exit 1
          fi

      - uses: actions/setup-node@v4
        if: steps.app.outputs.exists == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Cài đặt
        if: steps.app.outputs.exists == 'true'
        run: npm ci

      - name: Quét bảo mật phụ thuộc
        if: steps.app.outputs.exists == 'true'
        run: npm audit --audit-level=high

      - name: Lint
        if: steps.app.outputs.exists == 'true'
        run: npm run lint

      - name: Type check
        if: steps.app.outputs.exists == 'true'
        run: npm run type-check

      - name: Kiểm tra format
        if: steps.app.outputs.exists == 'true'
        run: npm run format:check

      # Chạy unit test KÈM ngưỡng coverage (vitest.config.ts) → cổng "có test tối thiểu".
      - name: Test (unit + coverage)
        if: steps.app.outputs.exists == 'true'
        run: npm run test:coverage

      - name: Build
        if: steps.app.outputs.exists == 'true'
        run: npm run build

  # Cổng E2E: chạy Playwright (desktop + mobile) + quét axe trên app đã build.
  # Đóng đúng cổng GĐ 6 của KHUNG 1: "Toàn bộ test xanh (gồm E2E Playwright)".
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kiểm tra đã có ứng dụng chưa
        id: app
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Chưa có package.json — bỏ qua E2E; sẽ tự chạy khi có dự án thật."
          fi

      - uses: actions/setup-node@v4
        if: steps.app.outputs.exists == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Cài đặt
        if: steps.app.outputs.exists == 'true'
        run: npm ci

      # Cả project desktop (Desktop Chrome) lẫn mobile (Pixel 5) đều dùng Chromium.
      - name: Cài trình duyệt Playwright
        if: steps.app.outputs.exists == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build
        if: steps.app.outputs.exists == 'true'
        run: npm run build
        env:
          # Đặt biến môi trường cần cho build qua GitHub Secrets, không hard-code.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # playwright.config.ts tự dựng server (`npm run start`) trước khi chạy test.
      - name: E2E (Playwright desktop + mobile + axe)
        if: steps.app.outputs.exists == 'true'
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Lưu báo cáo Playwright
        if: ${{ always() && steps.app.outputs.exists == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
