name: CodeQL

# Quét bảo mật MÃ NGUỒN (SAST) — bổ sung cho `npm audit` (chỉ quét phụ thuộc).
# Đóng cổng "audit bảo mật: không còn lỗ hổng nghiêm trọng" của KHUNG 1 (GĐ 6).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Quét định kỳ để bắt lỗ hổng mới phát hiện trong code đã merge.
    - cron: '0 3 * * 1'

jobs:
  # Repo khung (chưa có package.json) → bỏ qua để CI xanh; tự bật khi có dự án thật.
  # LƯU Ý cho dự án thật: phải BẬT "Code scanning" trong Settings → Code security & analysis,
  # nếu không CodeQL sẽ lỗi "Code scanning is not enabled for this repository" lúc upload kết quả.
  check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.app.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: app
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Chưa có package.json — bỏ qua CodeQL; sẽ tự chạy khi có dự án thật (cần bật Code scanning trong Settings)."
          fi

  analyze:
    needs: check
    if: needs.check.outputs.exists == 'true'
    name: Phân tích CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Khởi tạo CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Quét sâu hơn bộ mặc định (gồm cả các rule chất lượng + bảo mật mở rộng).
          queries: security-and-quality

      - name: Phân tích
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
