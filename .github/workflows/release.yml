name: Release

# CD nhẹ: sinh CHANGELOG + bump phiên bản + tạo GitHub Release TỰ ĐỘNG từ
# conventional commits (release-please). Khung đã ép conventional commits (commitlint)
# nên đây là bước tận dụng sẵn — đóng phần "lịch sử thay đổi" của GĐ 6 không phải viết tay.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Repo khung (chưa có package.json) → bỏ qua để không lỗi; tự bật khi có dự án thật.
  check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.app.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: app
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Chưa có package.json — bỏ qua Release; sẽ tự chạy khi có dự án thật."
          fi

  release-please:
    needs: check
    if: needs.check.outputs.exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
