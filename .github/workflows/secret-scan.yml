name: Secret scan

# Tự động hóa luật "bí mật KHÔNG bao giờ vào Git" (CLAUDE.md mục 3, KHUNG 1 GĐ 3).
# Trước đây chỉ dựa vào .gitignore + con người — gitleaks quét diff/commit để chặn rò rỉ.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# gitleaks-action đọc danh sách commit của PR qua API → cần quyền đọc PR.
# Thiếu quyền này gây lỗi 403 "Resource not accessible by integration".
permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Lấy đủ lịch sử để quét được toàn bộ commit trong PR/push.
          fetch-depth: 0

      - name: Quét bí mật (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          # Miễn phí cho repo cá nhân & repo public. Repo tổ chức cần GITLEAKS_LICENSE.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
