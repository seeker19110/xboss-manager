name: Lighthouse CI

# Cổng hiệu năng: build app rồi đo Lighthouse trên mỗi PR.
# Fail nếu dưới ngưỡng trong lighthouserc.json (performance budget).
# Repo khung (chưa có package.json) → tự bỏ qua để PR vẫn xanh.
on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kiểm tra đã có ứng dụng chưa
        id: app
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Chưa có package.json — bỏ qua Lighthouse; sẽ tự chạy khi có dự án thật."
          fi

      - uses: actions/setup-node@v4
        if: steps.app.outputs.exists == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Cài đặt
        if: steps.app.outputs.exists == 'true'
        run: npm ci

      - name: Build
        if: steps.app.outputs.exists == 'true'
        run: npm run build
        env:
          # Đặt biến môi trường cần cho build qua GitHub Secrets, không hard-code.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Chạy Lighthouse CI
        if: steps.app.outputs.exists == 'true'
        run: npx @lhci/cli autorun
